    - 0.25
    - 0.5
learning:
  enabled: true
  lookback_days: 14
  keep_best_n_prompts: 5
  source_trust_enabled: true
  source_trust_lookback_days: 30
lane_rebalancer:
  enabled: true
  lookback_days: 7
  blend_rate: 0.2
  min_budget_pct: 0.1
  max_budget_pct: 0.6
  min_sample_size: 10
  min_closes_per_lane: 5
dashboard:
  host: 127.0.0.1
  port: 8000
  refresh_seconds: 10
