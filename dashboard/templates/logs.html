{% extends "base.html" %}
{% block content %}
<div class="card wide">
  <h2>SYSTEM LOG // DB &middot; last 200</h2>
  <table class="dense">
    <thead><tr><th>ts</th><th>level</th><th>component</th><th>message</th></tr></thead>
    <tbody>
    {% for r in rows %}
      <tr>
        <td class="muted">{{ '%.0f'|format(r.ts or 0) }}</td>
        <td class="{{ 'bad' if r.level in ('ERROR','CRITICAL') else ('ok' if r.level == 'INFO' else 'muted') }}">{{ r.level }}</td>
        <td>{{ r.component }}</td>
        <td>{{ r.message }}</td>
      </tr>
    {% endfor %}
    </tbody>
  </table>
</div>

<div class="card wide">
  <h2>TAIL // polybot.log</h2>
  <pre class="logtail">{{ tail }}</pre>
</div>
{% endblock %}
