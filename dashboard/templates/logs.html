{% extends "base.html" %}
{% block content %}
<div class="card wide">
  <h2>System log (DB)</h2>
  <table>
    <thead><tr><th>When</th><th>Level</th><th>Component</th><th>Message</th></tr></thead>
    <tbody>
    {% for r in rows %}
      <tr>
        <td><small>{{ '%.0f'|format(r.ts or 0) }}</small></td>
        <td>{{ r.level }}</td>
        <td>{{ r.component }}</td>
        <td>{{ r.message }}</td>
      </tr>
    {% endfor %}
    </tbody>
  </table>
</div>

<div class="card wide">
  <h2>Tail of polybot.log</h2>
  <pre class="logtail">{{ tail }}</pre>
</div>
{% endblock %}
